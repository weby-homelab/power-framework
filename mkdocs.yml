site_name: P.O.W.E.R. Framework
site_description: AI-native Python toolkit for Second Brain knowledge bases — validate, index, search, and manage Obsidian vaults via CLI or MCP server. Uses P.A.R.A. + OKF methodology.
site_url: "https://weby-homelab.github.io/power-framework"
site_author: "Weby Homelab"
repo_url: "https://github.com/weby-homelab/power-framework"
repo_name: weby-homelab/power-framework
edit_uri: "edit/main/docs/"

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
      slugify: !!python/name:pymdownx.slugs.uslugify

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - CLI Reference: cli.md
  - MCP Server: mcp-server.md
  - Migration Guides:
      - AI Agent Migration (EN): migration-guide.md
      - AI Agent Migration (UA): migration-guide.ua.md
      - Hierarchical Index (EN): hierarchical-index-migration.md
      - Hierarchical Index (UA): hierarchical-index-migration.ua.md
  - API Reference:
      - Models: api/models.md
      - Parser: api/parser.md
      - Indexer: api/indexer.md
      - Linter: api/linter.md
      - Healer: api/healer.md
      - Markdown Checks: api/markdown_checks.md
      - Constants: api/constants.md
      - ROT Scoring: api/rot_scoring.md
      - Searcher: api/searcher.md
      - Utils: api/utils.md
  - Architecture: architecture.md
  - Contributing: contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: "https://github.com/weby-homelab/power-framework"

copyright: Built in Ukraine ⚡ &copy; 2026 Weby Homelab
