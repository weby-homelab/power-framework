services:
  power-mcp:
    build: .
    container_name: power-mcp
    ports:
      - "8000:8000"
    volumes:
      - ./vault:/vault:ro
    tmpfs:
      - /tmp:exec,mode=1777
    environment:
      - POWER_VAULT_DIR=/vault
      - POWER_MCP_TRANSPORT=http
      - XDG_CACHE_HOME=/tmp/power-cache
    restart: unless-stopped
    cap_drop:
      - ALL
    read_only: true
